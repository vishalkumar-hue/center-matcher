<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Center Matcher Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #f4f5f7;
    color: #1a1a1a;
    padding: 2rem 1rem;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 1.5rem; }
  .card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
  }
  .tab-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .hint { font-size: 12px; color: #777; margin-bottom: 8px; }
  input[type=file] {
    width: 100%;
    padding: 10px;
    border: 1px dashed #bbb;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-size: 13px;
    background: #fafafa;
  }
  .file-list { font-size: 13px; color: #444; margin: 6px 0 1rem; }
  .file-list div { padding: 4px 8px; background: #f0f0f0; border-radius: 6px; margin-bottom: 4px; }
  button.run-btn {
    width: 100%;
    padding: 12px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .errors { color: #c0392b; font-size: 13px; margin-top: 10px; }
  .results { margin-top: 1.5rem; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 1rem 0; }
  .stat { background: #f7f7f7; border-radius: 8px; padding: 12px; text-align: center; }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: #666; }
  .stat.green .num { color: #1d9e75; }
  .stat.red .num { color: #d85a30; }
  .stat.yellow .num { color: #ba7517; }
  table.per-file { width: 100%; font-size: 13px; border-collapse: collapse; margin-top: 10px; }
  table.per-file th, table.per-file td { padding: 6px 8px; border-bottom: 1px solid #eee; text-align: left; }
  a.download-link {
    display: inline-block;
    margin-top: 1rem;
    padding: 10px 18px;
    background: #1d9e75;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
  }
  .spinner {
    display: none;
    text-align: center;
    padding: 1rem;
    font-size: 14px;
    color: #666;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Center Matcher Tool</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('single')">List A vs 1 List B</button>
    <button class="tab-btn" onclick="switchTab('multi')">List A vs Multiple List B</button>
  </div>

  <!-- ═══════════ SINGLE B FILE TAB (purana) ═══════════ -->
  <div id="single-tab" class="tab-content active">
    <div class="card">
      <form id="single-form">
        <label>List A (master file)</label>
        <input type="file" name="file_a" id="single-file-a" accept=".xlsx,.xls" required>

        <label>List B</label>
        <input type="file" name="file_b" id="single-file-b" accept=".xlsx,.xls" required>

        <button type="submit" class="run-btn" id="single-run-btn">Run Matching</button>
      </form>
      <div class="spinner" id="single-spinner">Processing... please wait</div>
      <div class="errors" id="single-errors"></div>
      <div class="results" id="single-results"></div>
    </div>
  </div>

  <!-- ═══════════ MULTI B FILE TAB (naya) ═══════════ -->
  <div id="multi-tab" class="tab-content">
    <div class="card">
      <form id="multi-form">
        <label>List A (master file)</label>
        <input type="file" name="file_a" id="multi-file-a" accept=".xlsx,.xls" required>

        <label>List B files (multiple select karo — Ctrl/Cmd dabake)</label>
        <div class="hint">Har file output Excel mein apne alag tab mein aayegi</div>
        <input type="file" name="files_b" id="multi-files-b" accept=".xlsx,.xls" multiple required>
        <div class="file-list" id="multi-file-list"></div>

        <button type="submit" class="run-btn" id="multi-run-btn">Run Matching (All B Files)</button>
      </form>
      <div class="spinner" id="multi-spinner">Processing... ye thoda time le sakta hai</div>
      <div class="errors" id="multi-errors"></div>
      <div class="results" id="multi-results"></div>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(tab + '-tab').classList.add('active');
  event.target.classList.add('active');
}

// ── Show selected B files list (multi tab) ─────────────────
document.getElementById('multi-files-b').addEventListener('change', function() {
  const listDiv = document.getElementById('multi-file-list');
  listDiv.innerHTML = '';
  Array.from(this.files).forEach(f => {
    const div = document.createElement('div');
    div.textContent = f.name;
    listDiv.appendChild(div);
  });
});

// ── SINGLE FILE FORM SUBMIT ──────────────────────────────────
document.getElementById('single-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('single-run-btn');
  const spinner = document.getElementById('single-spinner');
  const errorsDiv = document.getElementById('single-errors');
  const resultsDiv = document.getElementById('single-results');

  errorsDiv.innerHTML = '';
  resultsDiv.innerHTML = '';
  btn.disabled = true;
  spinner.style.display = 'block';

  const formData = new FormData();
  formData.append('file_a', document.getElementById('single-file-a').files[0]);
  formData.append('file_b', document.getElementById('single-file-b').files[0]);

  try {
    const res = await fetch('/run', { method: 'POST', body: formData });
    const data = await res.json();
    spinner.style.display = 'none';
    btn.disabled = false;

    if (!data.success) {
      errorsDiv.innerHTML = data.errors.join('<br>');
      return;
    }

    resultsDiv.innerHTML = `
      <div class="stat-grid">
        <div class="stat green"><div class="num">${data.matched}</div><div class="lbl">Matched</div></div>
        <div class="stat red"><div class="num">${data.unmatched_a}</div><div class="lbl">Unmatched A</div></div>
        <div class="stat yellow"><div class="num">${data.unmatched_b}</div><div class="lbl">Unmatched B</div></div>
      </div>
      <p>Match Rate: <b>${data.match_rate}%</b></p>
      <a class="download-link" href="/download/${data.filename}">⬇ Download Excel</a>
    `;
  } catch (err) {
    spinner.style.display = 'none';
    btn.disabled = false;
    errorsDiv.textContent = 'Error: ' + err.message;
  }
});

// ── MULTI FILE FORM SUBMIT ───────────────────────────────────
document.getElementById('multi-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('multi-run-btn');
  const spinner = document.getElementById('multi-spinner');
  const errorsDiv = document.getElementById('multi-errors');
  const resultsDiv = document.getElementById('multi-results');

  errorsDiv.innerHTML = '';
  resultsDiv.innerHTML = '';
  btn.disabled = true;
  spinner.style.display = 'block';

  const formData = new FormData();
  formData.append('file_a', document.getElementById('multi-file-a').files[0]);
  const bFiles = document.getElementById('multi-files-b').files;
  for (let i = 0; i < bFiles.length; i++) {
    formData.append('files_b', bFiles[i]);
  }

  try {
    const res = await fetch('/run-multi', { method: 'POST', body: formData });
    const data = await res.json();
    spinner.style.display = 'none';
    btn.disabled = false;

    if (!data.success) {
      errorsDiv.innerHTML = data.errors.join('<br>');
      return;
    }

    let perFileRows = data.per_file.map(f => `
      <tr>
        <td>${f.tab}</td>
        <td>${f.matched}</td>
        <td>${f.unmatched_a}</td>
        <td>${f.unmatched_b}</td>
        <td>${f.match_rate}%</td>
      </tr>
    `).join('');

    resultsDiv.innerHTML = `
      <div class="stat-grid">
        <div class="stat green"><div class="num">${data.total_matched}</div><div class="lbl">Total Matched</div></div>
        <div class="stat red"><div class="num">${data.total_unmatched_a}</div><div class="lbl">Total Unmatched A</div></div>
        <div class="stat yellow"><div class="num">${data.total_unmatched_b}</div><div class="lbl">Total Unmatched B</div></div>
      </div>
      <table class="per-file">
        <tr><th>Tab</th><th>Matched</th><th>Unmatched A</th><th>Unmatched B</th><th>Rate</th></tr>
        ${perFileRows}
      </table>
      <a class="download-link" href="/download/${data.filename}">⬇ Download Excel (${data.per_file.length} tabs)</a>
    `;
  } catch (err) {
    spinner.style.display = 'none';
    btn.disabled = false;
    errorsDiv.textContent = 'Error: ' + err.message;
  }
});
</script>
</body>
</html>
